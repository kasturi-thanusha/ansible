- name: Setup Nginx, Grafana, Prometheus, Node Exporter, PostgreSQL, and deploy HTML
  hosts: all
  become: yes

  tasks:
    # -------------------- NGINX --------------------
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    # -------------------- GRAFANA --------------------
    - name: Add Grafana apt repository signing key
      apt_key:
        url: https://packages.grafana.com/gpg.key
        state: present

    - name: Add Grafana apt repository
      apt_repository:
        repo: "deb https://packages.grafana.com/oss/deb stable main"
        state: present

    - name: Install Grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Start and enable Grafana
      service:
        name: grafana-server
        state: started
        enabled: yes

    # -------------------- PROMETHEUS --------------------
    - name: Download Prometheus tarball
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.43.0/prometheus-2.43.0.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /opt/
        remote_src: yes

    - name: Move Prometheus binaries
      copy:
        remote_src: yes
        src: /opt/prometheus-2.43.0.linux-amd64/prometheus
        dest: /usr/local/bin/prometheus
        mode: '0755'

    - name: Move promtool binary
      copy:
        remote_src: yes
        src: /opt/prometheus-2.43.0.linux-amd64/promtool
        dest: /usr/local/bin/promtool
        mode: '0755'

    - name: Create Prometheus systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus Monitoring
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/prometheus --config.file=/opt/prometheus-2.43.0.linux-amd64/prometheus.yml --web.listen-address=:9090
          Restart=always

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
    - name: Configure Prometheus to scrape Node Exporter
      copy:
        dest: /opt/prometheus-2.43.0.linux-amd64/prometheus.yml
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets: ['localhost:9100']
        mode: '0644'

      

    - name: Reload systemd daemon
      command: systemctl daemon-reload

    - name: Start and enable Prometheus service
      service:
        name: prometheus
        state: started
        enabled: yes

    - name: Ensure port 9090 is allowed in UFW firewall
      ufw:
        rule: allow
        port: 9090
        proto: tcp
     
    # -------------------- NODE EXPORTER --------------------
    - name: Install node_exporter
      apt:
        name: prometheus-node-exporter
        state: present

    - name: Start and enable node_exporter
      service:
        name: prometheus-node-exporter
        state: started
        enabled: yes

    # -------------------- HTML DEPLOYMENT --------------------
    - name: Deploy custom HTML page
      copy:
        src: /root/ansible/files/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    # -------------------- POSTGRESQL --------------------
    - name: Install PostgreSQL and contrib package
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL service is running and enabled
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create PostgreSQL database
      become_user: postgres
      postgresql_db:
        name: sampledb
        state: present

    - name: Create PostgreSQL user with password
      become_user: postgres
      postgresql_user:
        name: sampleuser
        password: "sample123"
        state: present

    - name: Grant privileges on database to user
      become_user: postgres
      postgresql_privs:
        db: sampledb
        roles: sampleuser
        type: database
        privs: ALL
        state: present
  
